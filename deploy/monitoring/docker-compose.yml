services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: audiolad-uptime-kuma
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:3002:3001"
    networks:
      - audiolad-monitoring

networks:
  audiolad-monitoring:
    driver: bridge
